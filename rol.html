<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seleccionar Rol</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h2>¿Cómo quieres usar la plataforma?</h2>

  <button onclick="elegirRol('dealer')">Soy Dealer</button>
  <button onclick="elegirRol('consumidor')">🛒 Soy Consumidor</button>
</div>

<script>
if (localStorage.getItem("terminos") !== "aceptado") {
  window.location.href = "index.html";
}

function elegirRol(rol) {
  localStorage.setItem("rol", rol);

  if (rol === "dealer") {
    window.location.href = "dealer-login.html";
  } else {
    window.location.href = "comprador.html";
  }
}
</script>

</body>
</html>
